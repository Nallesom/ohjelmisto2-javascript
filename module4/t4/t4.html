<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form>
    <input id="query" name="q" type="text">
    <input type="submit" value="Search">
</form>
<div id="results">

</div>
<script>
  document.addEventListener('submit', async function(evt) {
    evt.preventDefault();

    const show = document.querySelector('input[id=query]').value;
    try {
      const response = await fetch(`https://api.tvmaze.com/search/shows?q=${show}`);
      const jsonData = await response.json();
      dataToHTML(jsonData);
    } catch (error) {
      console.log(error.message);
    }
  });

  function dataToHTML(jsonData) {
    const results = document.querySelector('#results');
    results.innerHTML = '';
    for (const data of jsonData) {
      const h2 = document.createElement('h2');
      const a = document.createElement('a');
      const img = document.createElement('img');
      const div = document.createElement('div');
      const article = document.createElement('article');
      console.log(data);
      h2.innerHTML = data.show.name;

      a.target = '_blank';
      a.innerText = data.show.url;

      img.src = data.show.image.medium ? data.show.image.medium : 'https://placehold.co/210x295?text=Not%20Found';
      img.alt = data.show.name;

      div.innerHTML = data.show.summary;

      article.appendChild(h2);
      article.appendChild(a);
      article.appendChild(img);
      article.appendChild(div);
      results.appendChild(article);
    }
  }
</script>
</body>
</html>
