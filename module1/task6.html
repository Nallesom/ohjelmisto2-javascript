<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Task6</title>
</head>
<body>
<p id="result"></p>
<script>
  'use strict';
  if (confirm('Should I calculate the square root?')) {
    const num = prompt('Enter the number');
    if (num > -1) {
      const sqrt = Math.sqrt(num);
      document.querySelector('#result').innerHTML = 'The square root of ' + num + ' is ' + sqrt;
    } else {
      document.querySelector('#result').innerHTML = 'The square root of a negative number is not defined';
    }
  } else {
    document.querySelector('#result').innerHTML = 'The square root is not calculated.';
  }
</script>
</body>
</html>
