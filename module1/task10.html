<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Task10</title>
</head>
<body>
<p id="result"></p>
<script>
  'use strict';
  const dice = prompt('Enter number of dice');
  const sumstr = prompt('Enter wanted sum');
  const sum = parseInt(sumstr);
  let hits = 0;
  for (let i = 0; i < 10000; i++) {
    let rollsum = 0;
    for (let j = 0; j < dice; j++) {
      let roll = Math.floor(Math.random() * (6 - 1 + 1)) + 1;
      rollsum += roll;
    }
    if (rollsum === sum) {
      hits++;
    }
  }
  let chance = ((hits / 10000) * 100).toFixed(2);
  document.querySelector('#result').innerHTML = 'Probability to get sum ' + sum + ' with ' + dice + ' dice is ' +
      chance + '%';
</script>
</body>
</html>
