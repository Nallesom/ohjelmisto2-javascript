<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Task3</title>
</head>
<body>
<h1>Your numbers</h1>
<p id="sum"></p>
<p id="product"></p>
<p id="average"></p>
<script>
  'use strict';
  let numstr1 = prompt('Enter first number');
  let numstr2 = prompt('Enter second number');
  let numstr3 = prompt('Enter third number');

  let num1 = parseInt(numstr1);
  let num2 = parseInt(numstr2);
  let num3 = parseInt(numstr3);

  let sum = num1 + num2 + num3;
  let product = num1 * num2 * num3;
  let average = sum / 3;

  document.querySelector('#sum').innerHTML = 'Sum: ' + sum;
  document.querySelector('#product').innerHTML = 'Product: ' + product;
  document.querySelector('#average').innerHTML = 'Average: ' + average;
</script>
</body>
</html>
