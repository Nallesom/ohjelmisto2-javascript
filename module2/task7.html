<!DOCTYPE html>
<html>
    <head>
        <meta charset='UTF-8'>
        <title>Task7</title>
    </head>
    <body>
        <ul></ul>
        <script>
            'use strict';
            const ul = document.querySelector('ul');
            const dicesides = parseInt(prompt("How many sides does the dice have?"));
            while (true)
            {
                const num = diceroll(dicesides);
                const li = document.createElement('li');
                li.textContent = num;
                ul.appendChild(li);
                if (num === dicesides)
                {
                    break;
                }
            }

            function diceroll(sides) 
            { 
                return Math.floor(Math.random() * (sides - 1 + 1)) + 1; 
            }
        </script>
    </body>
</html>
