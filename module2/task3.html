<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Task3</title>
</head>
<body>
<ul></ul>
<script>
  'use strict';
  const ul = document.querySelector('ul');
  let dogs = [6];
  for (let i = 0; i < 6; i++) {
    dogs[i] = prompt('What is the name of your ' + (i + 1) + ' dog');
  }
  for (let name of dogs.reverse()) {
    const li = document.createElement('li');
    li.textContent = name;
    ul.appendChild(li);
  }
</script>
</body>
</html>
