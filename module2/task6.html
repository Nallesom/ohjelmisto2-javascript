<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Task6</title>
</head>
<body>
<ul></ul>
<script>
  'use strict';
  const ul = document.querySelector('ul');
  while (true) {
    const num = diceroll();
    const li = document.createElement('li');
    li.textContent = num;
    ul.appendChild(li);
    if (num === 6) {
      break;
    }
  }

  function diceroll() {
    return Math.floor(Math.random() * (6 - 1 + 1)) + 1;
  }
</script>
</body>
</html>
